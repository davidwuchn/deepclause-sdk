[build-system]
requires = ["setuptools>=65.5.1", "wheel>=0.42.0"]
build-backend = "setuptools.build_meta"

[project]
name = "autorccar"
version = "1.0.0"
description = "Autonomous remote-controlled car system with real-time video processing, neural network model training, and intelligent driving decision-making"
readme = "README.md"
license = {file = "LICENSE.md"}
requires-python = ">=3.11"
authors = [
    {name = "AutoRCCar Contributors"}
]
keywords = [
    "autonomous-driving",
    "rc-car",
    "neural-network",
    "object-detection",
    "opencv",
    "raspberry-pi"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Image Recognition",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "opencv-python==4.12.0.88",
    "numpy==2.2.6",
    "scikit-learn==1.7.1",
    "pygame==2.6.1",
