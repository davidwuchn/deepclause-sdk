    "pytest==8.4.1",
]

[project.urls]
Homepage = "https://github.com/autorccar/AutoRCCar"
Documentation = "https://github.com/autorccar/AutoRCCar/blob/main/README.md"
Repository = "https://github.com/autorccar/AutoRCCar"
Issues = "https://github.com/autorccar/AutoRCCar/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["computer*", "arduino*", "raspberryPi*", "Traffic_signal*"]
namespaces = false

[tool.setuptools.package-data]
"computer.cascade_xml" = ["*.xml"]
"computer.chess_board" = ["*.jpg"]
"arduino" = ["*.ino", "*.md"]
"raspberryPi" = ["*.py"]
"Traffic_signal" = ["*.ino", "*.jpg", "*.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
