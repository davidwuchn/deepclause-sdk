[tox]
envlist = py39, py310, py311, py312, py313, flake8

[testenv]
deps =
    pycodestyle >= 2.12.0
    pytest >= 8.0.0
    pydiff >= 0.1.2
commands = pytest {posargs}

[testenv:flake8]
deps = flake8
commands = flake8 autopep8.py --max-line-length=79

[pycodestyle]
max-line-length = 79
ignore = E226,E24,W50,W690
